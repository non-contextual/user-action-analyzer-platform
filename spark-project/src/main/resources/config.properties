# MySQL 连接配置（与 docker-compose .env 保持一致）
jdbc.driver=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://mysql:3306/user_action_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
jdbc.user=spark
jdbc.password=spark123

# 数据格式: generated（模拟数据）或 kaggle（Kaggle 真实数据）
data.format=kaggle

# 模拟数据文件路径（data.format=generated 时使用）
data.user_info=/opt/data/user_info.csv
data.user_visit_action=/opt/data/user_visit_action.csv

# Kaggle 数据配置（data.format=kaggle 时使用）
# 将 2019-Oct.csv 或 2019-Nov.csv 放入 ./data/ 目录后，修改 data.format=kaggle
data.kaggle.path=/opt/data/2019-Oct.csv
# 采样率 (0.0-1.0)，1.0=不采样，建议大文件使用 0.1 (约4M行)
data.kaggle.sample=0.1
