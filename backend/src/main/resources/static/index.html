<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户行为分析仪表板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .chart-container {
            width: 100%;
            height: 400px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            margin: 0;
        }
        .header p {
            color: #666;
            margin: 10px 0 0 0;
        }
        .api-link {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            display: block;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
        }
        .api-link:hover {
            background: #0056b3;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        .error {
            color: #f44336;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>用户行为分析仪表板</h1>
            <p>用户行为分析数据实时可视化</p>
            <a href="/api/swagger-ui.html" class="api-link">查看 API 文档</a>
        </div>

        <div id="loading" class="loading">加载数据中...</div>

        <div class="card">
            <h2>会话时长分布</h2>
            <div id="sessionDurationChart" class="chart-container"></div>
        </div>

        <div class="card">
            <h2>会话步长分布</h2>
            <div id="stepLengthChart" class="chart-container"></div>
        </div>

        <div class="card">
            <h2>热门品类 Top 10</h2>
            <div id="top10CategoriesChart" class="chart-container"></div>
        </div>

        <div class="card">
            <h2>页面转化率</h2>
            <div id="pageConversionChart" class="chart-container"></div>
        </div>

        <div class="card">
            <h2>会话汇总</h2>
            <div id="sessionSummaryChart" class="chart-container"></div>
        </div>

        <div class="card">
            <h2>用户行为分层分布</h2>
            <p style="color:#888;font-size:13px;margin-top:-6px;">基于购买次数与消费金额的 RFM 行为分层（VIP / 高价值 / 潜力 / 普通 / 沉默）</p>
            <div id="userLevelChart" class="chart-container"></div>
        </div>

        <div class="card">
            <h2>商品关联规则（FP-Growth）</h2>
            <p style="color:#888;font-size:13px;margin-top:-6px;">用户购买品类之间的强关联规则，按置信度排序</p>
            <div id="associationTableContainer" style="overflow-x:auto;"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        // 完整的 API 路径格式：/api/analytics/...
        // 例如：/api/analytics/session/length-distribution?taskId=1
        const TASK_ID = 1;

        async function fetchWithRetry(url, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    console.error(`Attempt ${i + 1} failed:`, error);
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, 1000 * (i + 1)));
                }
            }
        }

        function initSessionDurationChart(data) {
            const chart = echarts.init(document.getElementById('sessionDurationChart'));
            const option = {
                title: { text: '会话时长分布' },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: data.xAxis },
                yAxis: { type: 'value', name: '会话数' },
                series: [{
                    name: '会话数',
                    type: 'line',
                    data: data.series,
                    smooth: true,
                    areaStyle: { opacity: 0.3 },
                    itemStyle: { color: '#5470c6' }
                }]
            };
            chart.setOption(option);
        }

        function initStepLengthChart(data) {
            const chart = echarts.init(document.getElementById('stepLengthChart'));
            const option = {
                title: { text: '会话步长分布' },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { data: data.series.map(s => s.name === 'Step Count' ? '步长数' : s.name) },
                xAxis: { type: 'category', data: data.xAxis },
                yAxis: { type: 'value', name: '会话数' },
                series: data.series.map(s => ({
                    name: s.name === 'Step Count' ? '步长数' : s.name,
                    type: 'bar',
                    data: s.data,
                    itemStyle: { borderRadius: [4, 4, 4, 4] }
                }))
            };
            chart.setOption(option);
        }

        function initTop10CategoriesChart(data) {
            const chart = echarts.init(document.getElementById('top10CategoriesChart'));
            const option = {
                title: { text: '热门品类 Top 10' },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { data: data.series.map(s => {
                    if (s.name === 'Clicks') return '点击数';
                    if (s.name === 'Orders') return '订单数';
                    if (s.name === 'Payments') return '支付数';
                    return s.name;
                }) },
                xAxis: { type: 'category', data: data.xAxis, name: '品类ID' },
                yAxis: { type: 'value', name: '数量' },
                series: data.series.map(s => ({
                    name: s.name === 'Clicks' ? '点击数' : s.name === 'Orders' ? '订单数' : s.name === 'Payments' ? '支付数' : s.name,
                    type: 'bar',
                    data: s.data,
                    itemStyle: { borderRadius: [4, 4, 4, 4] }
                }))
            };
            chart.setOption(option);
        }

        function initPageConversionChart(data) {
            const chart = echarts.init(document.getElementById('pageConversionChart'));
            // 找最大值和最小值的索引，只标注这两个点避免所有点都有大红针
            const maxIdx = data.series.indexOf(Math.max(...data.series));
            const minIdx = data.series.indexOf(Math.min(...data.series));
            const option = {
                title: { text: '页面单跳转化率 (%)' },
                tooltip: {
                    trigger: 'axis',
                    formatter: params => `${params[0].name}<br/>转化率: <b>${params[0].value}%</b>`
                },
                xAxis: {
                    type: 'category',
                    data: data.xAxis,
                    name: '页面跳转',
                    axisLabel: { rotate: 30 }
                },
                yAxis: { type: 'value', name: '转化率 (%)', min: 0 },
                series: [{
                    name: '转化率',
                    type: 'line',
                    data: data.series,
                    smooth: true,
                    areaStyle: { opacity: 0.2, color: '#91cc75' },
                    itemStyle: { color: '#52c41a' },
                    lineStyle: { width: 2 },
                    // 只在最高和最低点打标注
                    markPoint: {
                        symbolSize: 40,
                        data: [
                            { name: '最高', type: 'max', itemStyle: { color: '#52c41a' } },
                            { name: '最低', type: 'min', itemStyle: { color: '#ff4d4f' } }
                        ]
                    },
                    label: { show: true, formatter: '{c}%', fontSize: 11, color: '#333' }
                }]
            };
            chart.setOption(option);
        }

        function initSessionSummaryChart(data) {
            const chart = echarts.init(document.getElementById('sessionSummaryChart'));
            // 固定颜色，刷新不变色
            const palette = ['#5470c6','#a8d8a8','#73c0de','#3ba272','#fc8452','#9a60b4','#ea7ccc','#fac858','#ee6666'];
            const option = {
                title: { text: '会话时长分布（汇总）' },
                tooltip: { trigger: 'item', formatter: '{b}: {c} 个会话 ({d}%)' },
                // 横向 legend 放顶部，避免纵向被截断
                legend: { orient: 'horizontal', top: '5%', type: 'scroll' },
                series: [{
                    name: '时长分布',
                    type: 'pie',
                    radius: ['35%', '65%'],
                    center: ['50%', '60%'],
                    avoidLabelOverlap: true,
                    itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                    label: { show: true, formatter: '{b}\n{d}%', fontSize: 11 },
                    emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' } },
                    data: data.data.map((item, i) => ({
                        value: item.value,
                        name: item.name,
                        itemStyle: { color: palette[i % palette.length] }
                    }))
                }]
            };
            chart.setOption(option);
        }

        function initUserLevelChart(data) {
            const chart = echarts.init(document.getElementById('userLevelChart'));
            // 固定颜色映射，让每次刷新颜色一致
            const colorMap = {
                'VIP':   '#f5222d',
                '高价值': '#fa8c16',
                '潜力':  '#1890ff',
                '普通':  '#52c41a',
                '沉默':  '#bfbfbf'
            };
            const option = {
                title: { text: '用户行为分层分布' },
                tooltip: { trigger: 'item', formatter: '{b}: {c} 人 ({d}%)' },
                legend: {
                    orient: 'horizontal',
                    bottom: 0,
                    type: 'scroll',
                    pageTextStyle: { color: '#666' }
                },
                series: [{
                    name: '用户分层',
                    type: 'pie',
                    radius: ['35%', '65%'],
                    center: ['50%', '45%'],
                    avoidLabelOverlap: true,
                    itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                    label: { show: true, formatter: '{b}\n{d}%' },
                    data: data.data.map(item => ({
                        value: item.value,
                        name: item.name,
                        itemStyle: { color: colorMap[item.name] || '#999' }
                    }))
                }]
            };
            chart.setOption(option);
        }

        function renderAssociationTable(data) {
            const container = document.getElementById('associationTableContainer');
            if (!data || !data.rules || data.rules.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无数据（需先运行 taskId=5 的 FP-Growth 分析任务）</div>';
                return;
            }
            const rows = data.rules.map((r, i) => `
                <tr style="background:${i%2===0?'#fafafa':'#fff'}">
                    <td style="padding:8px 12px;">${i+1}</td>
                    <td style="padding:8px 12px;color:#1890ff;font-weight:500;">${r.antecedent}</td>
                    <td style="padding:8px 12px;color:#52c41a;font-weight:500;">${r.consequent}</td>
                    <td style="padding:8px 12px;text-align:right;">${(r.confidence * 100).toFixed(1)}%</td>
                    <td style="padding:8px 12px;text-align:right;">${r.lift.toFixed(2)}</td>
                    <td style="padding:8px 12px;text-align:right;">${(r.support * 100).toFixed(2)}%</td>
                </tr>
            `).join('');
            container.innerHTML = `
                <table style="width:100%;border-collapse:collapse;font-size:13px;">
                    <thead>
                        <tr style="background:#001529;color:#fff;">
                            <th style="padding:10px 12px;text-align:left;">#</th>
                            <th style="padding:10px 12px;text-align:left;">前项品类 →</th>
                            <th style="padding:10px 12px;text-align:left;">后项品类</th>
                            <th style="padding:10px 12px;text-align:right;">置信度</th>
                            <th style="padding:10px 12px;text-align:right;">提升度</th>
                            <th style="padding:10px 12px;text-align:right;">支持度</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function getRandomColor() {
            const colors = ['#5470c6', '#91cc75', '#f39c12', '#f363e4', '#ff6b6b', '#c9302c', '#7bed9f', '#00d2d3', '#1e90ff', '#ff4757'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        async function loadAllCharts() {
            try {
                const [durationData, stepData, categoriesData, conversionData, summaryData,
                       userLevelData, associationData] = await Promise.all([
                    fetchWithRetry(`${API_BASE_URL}/analytics/session/length-distribution?taskId=${TASK_ID}`),
                    fetchWithRetry(`${API_BASE_URL}/analytics/session/step-distribution?taskId=${TASK_ID}`),
                    fetchWithRetry(`${API_BASE_URL}/analytics/category/top10?taskId=${TASK_ID}`),
                    fetchWithRetry(`${API_BASE_URL}/analytics/page/conversion-rate?taskId=${TASK_ID}`),
                    fetchWithRetry(`${API_BASE_URL}/analytics/session/summary?taskId=${TASK_ID}`),
                    fetchWithRetry(`${API_BASE_URL}/analytics/user/level-distribution?taskId=4`).catch(() => ({ code: 404 })),
                    fetchWithRetry(`${API_BASE_URL}/analytics/association/rules?taskId=5`).catch(() => ({ code: 404 }))
                ]);

                document.getElementById('loading').style.display = 'none';

                if (durationData.code === 200 && durationData.data) {
                    initSessionDurationChart(durationData.data);
                } else {
                    console.warn('会话时长分布数据加载失败:', durationData.message || '无数据');
                }
                if (stepData.code === 200 && stepData.data) {
                    initStepLengthChart(stepData.data);
                } else {
                    console.warn('会话步长分布数据加载失败:', stepData.message || '无数据');
                }
                if (categoriesData.code === 200 && categoriesData.data) {
                    initTop10CategoriesChart(categoriesData.data);
                } else {
                    console.warn('热门品类 Top10 数据加载失败:', categoriesData.message || '无数据');
                    // 显示无数据提示
                    const top10ChartContainer = document.getElementById('top10CategoriesChart');
                    if (top10ChartContainer) {
                        top10ChartContainer.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #666;">暂无数据</div>';
                    }
                }
                if (conversionData.code === 200 && conversionData.data) {
                    initPageConversionChart(conversionData.data);
                } else {
                    console.warn('页面转化率数据加载失败:', conversionData.message || '无数据');
                    // 显示无数据提示
                    const conversionChartContainer = document.getElementById('pageConversionChart');
                    if (conversionChartContainer) {
                        conversionChartContainer.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #666;">暂无数据</div>';
                    }
                }
                if (summaryData.code === 200 && summaryData.data) {
                    initSessionSummaryChart(summaryData.data);
                } else {
                    console.warn('会话汇总数据加载失败:', summaryData.message || '无数据');
                }

                if (userLevelData.code === 200 && userLevelData.data) {
                    initUserLevelChart(userLevelData.data);
                } else {
                    document.getElementById('userLevelChart').innerHTML =
                        '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;">暂无数据（请先运行 taskId=4 的 PROFILE 分析任务）</div>';
                }

                if (associationData.code === 200 && associationData.data) {
                    renderAssociationTable(associationData.data);
                } else {
                    renderAssociationTable(null);
                }

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        <h3>数据加载失败</h3>
                        <p>${error.message}</p>
                        <p>请确保后端服务正在运行且可访问。</p>
                    </div>
                `;
                console.error('加载图表出错:', error);
            }
        }

        window.addEventListener('resize', () => {
            const charts = [
                echarts.getInstanceByDom(document.getElementById('sessionDurationChart')),
                echarts.getInstanceByDom(document.getElementById('stepLengthChart')),
                echarts.getInstanceByDom(document.getElementById('top10CategoriesChart')),
                echarts.getInstanceByDom(document.getElementById('pageConversionChart')),
                echarts.getInstanceByDom(document.getElementById('sessionSummaryChart')),
                echarts.getInstanceByDom(document.getElementById('userLevelChart'))
            ];
            charts.forEach(chart => chart && chart.resize());
        });

        loadAllCharts();
    </script>
</body>
</html>
